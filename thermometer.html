.badge-bear { background: rgba(248,81,73,0.15); color: var(--red); }
.badge-neutral { background: rgba(139,148,158,0.15); color: var(--muted); }
.btn-section { margin-bottom: 16px; }

.btn:hover { background: rgba(88,166,255,0.08); border-color: var(--accent); }
.btn:active { transform: scale(0.98); }
.status-bar { display: flex; justify-content: space-between; align-items: center; font-size: 0.75em; color: var(--muted); margin-bottom: 8px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
.status-live { background: var(--green); }

.status-error { background: var(--red); }
.disclaimer { font-size: 0.72em; color: var(--muted); text-align: center; padding: 16px 0 32px; line-height: 1.6; }

    var dayChg = sh.prevClose ? ((sh.price-sh.prevClose)/sh.prevClose*100) : 0;
    if (dayChg > 2) signals.push({label:'日内强度',value:'强势 +'+dayChg.toFixed(2)+'%',cls:'bull'});
    else if (dayChg < -2) signals.push({label:'日内强度',value:'弱势 '+dayChg.toFixed(2)+'%',cls:'bear'});
    else signals.push({label:'日内强度',value:'震荡 '+(dayChg>=0?'+':'')+dayChg.toFixed(2)+'%',cls:'neutral'});
    var html = '';
    for (var i = 0; i < signals.length; i++) {
      var s = signals[i];
      html += '<div class="signal-row"><span>'+s.label+'</span><span class="signal-badge badge-'+s.cls+'">'+s.value+'</span></div>';
    }
    document.getElementById('signalPanel').innerHTML = html;
  }

  var temp = D.temperature;
  var v = calcVerdict(temp);
  document.getElementById('tempNumber').textContent = temp;
  document.getElementById('tempNumber').style.color = 'var(--' + v.cls + ')';
  document.getElementById('tempVerdict').textContent = v.text;
  document.getElementById('tempVerdict').style.color = 'var(--' + v.cls + ')';
  document.getElementById('gaugeDot').style.left = temp + '%';
  document.getElementById('updateTime').textContent = D.updated_at || '--';
  document.getElementById('statusText').textContent = '数据就绪';

  renderIndices(norm(D.sh), norm(D.sz), norm(D.kc));
  renderMA(D.sh.price, D.ma20, D.ma60);
  renderSignals(D.sh.price, D.ma20, D.ma60, temp, norm(D.sh));

  document.getElementById('loadingView').classList.add('hidden');
  document.getElementById('mainView').classList.remove('hidden');
})();
</script>
