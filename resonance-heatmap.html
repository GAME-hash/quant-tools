<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>共振热力榜 | 量化工具箱</title>
<style>
:root {
  --bg: #0d1117; --card: #161b22; --border: #21262d; --text: #c9d1d9;
  --muted: #8b949e; --accent: #58a6ff; --green: #3fb950; --red: #f85149;
  --yellow: #d2991d; --orange: #f0883e;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  min-height: 100vh; padding: 16px; max-width: 600px; margin: 0 auto;
}
.header { text-align: center; padding: 20px 0 8px; }
.header h1 { font-size: 1.4em; font-weight: 700; background: linear-gradient(135deg, var(--accent), #a371f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.header .subtitle { font-size: 0.78em; color: var(--muted); margin-top: 4px; }
.status-bar { display: flex; justify-content: space-between; align-items: center; font-size: 0.75em; color: var(--muted); margin-bottom: 8px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
.status-live { background: var(--green); }
.status-stale { background: var(--yellow); }
.status-error { background: var(--red); }

/* ── 三大指数区域 ── */
.major-section { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px 14px; margin-bottom: 14px; }
.major-title { font-size: 0.82em; color: var(--muted); margin-bottom: 10px; letter-spacing: 1px; }
.major-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.major-card { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 12px 8px; text-align: center; }
.major-name { font-size: 0.75em; color: var(--muted); margin-bottom: 4px; }
.major-score { font-size: 1.5em; font-weight: 800; line-height: 1.1; }
.major-emoji { font-size: 1.2em; margin-top: 2px; }
.major-signal { font-size: 0.68em; color: var(--muted); margin-top: 2px; }
.major-price { font-size: 0.72em; color: var(--muted); margin-top: 2px; }

/* ── 行业热力榜 ── */
.heatmap-section { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px 14px; margin-bottom: 14px; }
.heatmap-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.heatmap-title { font-size: 0.82em; color: var(--muted); letter-spacing: 1px; }
.heatmap-count { font-size: 0.72em; color: var(--muted); }
.legend-row { display: flex; justify-content: space-between; font-size: 0.62em; color: var(--muted); padding: 0 4px 8px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
.legend-row span { flex: 1; }
.legend-row span:nth-child(1) { flex: 0 0 32px; text-align: center; }
.legend-row span:nth-child(2) { text-align: left; }
.legend-row span:nth-child(3) { text-align: right; }
.legend-row span:nth-child(4) { text-align: right; flex: 0 0 58px; }
.legend-row span:nth-child(5) { text-align: right; flex: 0 0 68px; }
.legend-row span:nth-child(6) { text-align: right; flex: 0 0 72px; }

.hm-row { display: flex; align-items: center; padding: 10px 4px; border-bottom: 1px solid var(--border); transition: background 0.15s; }
.hm-row:last-child { border-bottom: none; }
.hm-row:hover { background: rgba(255,255,255,0.02); }
.hm-emoji { flex: 0 0 32px; text-align: center; font-size: 1.1em; }
.hm-name { flex: 1; font-size: 0.9em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hm-price { flex: 0 0 72px; text-align: right; font-size: 0.85em; font-weight: 600; font-variant-numeric: tabular-nums; }
.hm-change { flex: 0 0 58px; text-align: right; font-size: 0.8em; font-weight: 600; font-variant-numeric: tabular-nums; }
.hm-score-wrap { flex: 0 0 68px; text-align: right; }
.hm-score-bar { height: 5px; border-radius: 3px; margin-top: 3px; background: var(--border); overflow: hidden; }
.hm-score-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
.hm-score-num { font-size: 0.85em; font-weight: 700; }
.hm-signal { flex: 0 0 72px; text-align: right; font-size: 0.72em; font-weight: 600; }

/* 分数颜色 */
.score-fire { color: #ff6b35; }      /* 80+ */
.score-bull { color: var(--green); }  /* 60-79 */
.score-neutral { color: var(--yellow); } /* 40-59 */
.score-bear { color: var(--orange); } /* 20-39 */
.score-crash { color: var(--red); }   /* <20 */

.bar-fire { background: linear-gradient(90deg, var(--green), #ff6b35); }
.bar-bull { background: var(--green); }
.bar-neutral { background: var(--yellow); }
.bar-bear { background: var(--orange); }
.bar-crash { background: var(--red); }

/* ── 概览区 ── */
.overview-section { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px; margin-bottom: 14px; }
.overview-row { display: flex; justify-content: space-around; text-align: center; }
.overview-item { flex: 1; }
.overview-num { font-size: 1.6em; font-weight: 800; }
.overview-label { font-size: 0.68em; color: var(--muted); margin-top: 2px; }

.btn-section { margin-bottom: 16px; }
.btn { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: var(--card); color: var(--accent); font-size: 0.95em; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn:hover { background: rgba(88,166,255,0.08); border-color: var(--accent); }
.btn:active { transform: scale(0.98); }

.disclaimer { font-size: 0.72em; color: var(--muted); text-align: center; padding: 16px 0 32px; line-height: 1.6; }
.loading { text-align:center; padding:40px; color:var(--muted); }
.hidden { display: none !important; }

/* 排名徽章 */
.rank-badge { display: inline-block; width: 20px; height: 20px; line-height: 20px; text-align: center; border-radius: 4px; font-size: 0.7em; font-weight: 700; }
.rank-1 { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; }
.rank-2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #000; }
.rank-3 { background: linear-gradient(135deg, #cd7f32, #b87333); color: #fff; }
.rank-other { color: var(--muted); }
</style>
</head>
<body>

<div class="header">

  <div class="subtitle">主流板块ETF · 行业共振扫描</div>
</div>

</div>

      <div class="overview-item">
        <div class="overview-num" style="color:var(--green)" id="ovBull">--</div>
        <div class="overview-label">😤 偏多以上</div>
      </div>
      <div class="overview-item">
        <div class="overview-num" style="color:var(--yellow)" id="ovNeutral">--</div>

      <div class="overview-item">

  </div>

  <!-- 三大指数共振 -->
  <div class="major-section">
    <div class="major-title">📊 三大指数共振</div>
    <div class="major-grid" id="majorGrid"></div>
  </div>

  <!-- 行业热力榜 -->
  <div class="heatmap-section">
    <div class="heatmap-header">
      <span class="heatmap-title">🏭 行业共振热力榜</span>
      <span class="heatmap-count">按共振评分降序</span>

    <div class="legend-row">
      <span>#</span><span>行业</span><span>最新价</span><span>涨跌幅</span><span>共振评分</span><span>信号</span>
    </div>
    <div id="heatmapList"></div>
  </div>

  <div class="btn-section">
    <button class="btn" onclick="location.reload()">🔄 刷新扫描</button>
  </div>
</div>

<div id="errorView" class="loading hidden">
  <p>⚠️ 数据加载失败</p>
  <p style="font-size:0.85em;margin-top:8px">请运行 build_resonance.py 重新生成，或检查网络</p>
  <button class="btn" style="margin-top:16px" onclick="location.reload()">🔄 重试</button>
</div>

<p class="disclaimer">

<script>
(function() {
  if (!window.__DATA__) { document.getElementById('errorView').classList.remove('hidden'); return; }
  const D = window.__DATA__;
  
  document.getElementById('updateTime').textContent = D.updated_at || '--';
  document.getElementById('statusText').textContent = '数据就绪';
  
  // 概览统计
  let bull = 0, neutral = 0, bear = 0;
  D.items.forEach(r => { if (r.score >= 60) bull++; else if (r.score >= 40) neutral++; else bear++; });
  document.getElementById('ovBull').textContent = bull;
  document.getElementById('ovNeutral').textContent = neutral;
  document.getElementById('ovBear').textContent = bear;
  
  // 三大指数
  const indices = D.items.filter(r => r.type === 'index');
  let idxHTML = '';
  indices.forEach(r => {
    const sign = r.change_pct >= 0 ? '+' : '';
    const cls = r.change_pct >= 0 ? 'green' : 'red';
    const vcls = r.score >= 60 ? 'green' : r.score >= 40 ? 'yellow' : 'red';
    idxHTML += '<div class="major-card"><div class="major-name">'+r.name+'</div>';
    idxHTML += '<div class="major-price">'+r.price.toFixed(2)+' <span class="'+cls+'" style="font-size:0.78em">'+sign+r.change_pct.toFixed(2)+'%</span></div>';
    idxHTML += '<div class="major-resonance" style="color:var(--'+vcls+')">共振 '+r.score+' '+r.verdict+'</div></div>';
  });
  document.getElementById('majorGrid').innerHTML = idxHTML || '<p style="color:var(--muted)">暂无数据</p>';
  
  // 行业热力榜
  const etfs = D.items.filter(r => r.type === 'etf');
  let listHTML = '';
  etfs.forEach((r, i) => {
    const rank = i < 3 ? 'rank-'+(i+1) : 'rank-other';
    const emoji = r.score >= 80 ? '🔥' : r.score >= 60 ? '😤' : r.score >= 40 ? '😐' : r.score >= 20 ? '😰' : '😱';
    const sign = r.change_pct >= 0 ? '+' : '';
    const cls = r.change_pct >= 0 ? 'green' : 'red';
    const barW = r.score;
    listHTML += '<div class="heatmap-row">';
    listHTML += '<span class="rank '+rank+'">'+(i+1)+'</span>';
    listHTML += '<span class="industry-name">'+emoji+' '+r.name+'</span>';
    listHTML += '<span class="price">'+r.price.toFixed(2)+'</span>';
    listHTML += '<span class="change '+cls+'">'+sign+r.change_pct.toFixed(2)+'%</span>';
    listHTML += '<span class="resonance"><span class="score-bar"><span class="score-fill" style="width:'+barW+'%"></span></span> '+r.score+'</span>';
    listHTML += '<span class="signal">'+r.verdict+'</span>';
    listHTML += '</div>';
  });
  document.getElementById('heatmapList').innerHTML = listHTML || '<p style="color:var(--muted);text-align:center;padding:16px">暂无行业数据</p>';
  
  document.getElementById('loadingView').classList.add('hidden');
  document.getElementById('mainView').classList.remove('hidden');
})();
